<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C49B32"/>
      <stop offset="50%" style="stop-color:#B08A28"/>
      <stop offset="100%" style="stop-color:#9A7820"/>
    </linearGradient>
    <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#1A3050"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000015"/>
    </filter>
  </defs>

  <g transform="translate(150, 150)" filter="url(#shadow)">
    <!-- Outer gear ring -->
    <g fill="url(#gold)" stroke="#9A7820" stroke-width="0.5">
      <circle cx="0" cy="0" r="120" fill="url(#gold)" stroke="#9A7820" stroke-width="1"/>
      <g>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(0)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(15)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(30)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(45)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(60)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(75)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(90)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(105)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(120)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(135)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(150)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(165)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(180)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(195)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(210)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(225)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(240)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(255)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(270)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(285)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(300)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(315)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(330)"/>
        <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(345)"/>
      </g>
    </g>

    <!-- Inner circle - lighter blue-white -->
    <circle cx="0" cy="0" r="108" fill="#F0F4F8" stroke="#D0D8E0" stroke-width="1"/>

    <!-- Decorative ring -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#C49B32" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="96" fill="none" stroke="#C49B32" stroke-width="0.5" opacity="0.2"/>

    <!-- Compass rose -->
    <!-- North (gold) -->
    <polygon points="0,-90 12,-20 0,-30 -12,-20" fill="#C49B32" stroke="#9A7820" stroke-width="0.5"/>
    <polygon points="0,-90 -12,-20 0,-30 12,-20" fill="#B08A28" stroke="#9A7820" stroke-width="0.5" opacity="0.7"/>
    <!-- South (dark blue) -->
    <polygon points="0,90 12,20 0,30 -12,20" fill="#1E3A5F" stroke="#152E4A" stroke-width="0.5" opacity="0.9"/>
    <polygon points="0,90 -12,20 0,30 12,20" fill="#2A4A70" stroke="#152E4A" stroke-width="0.5" opacity="0.7"/>
    <!-- East (dark blue) -->
    <polygon points="90,0 20,12 30,0 20,-12" fill="#1E3A5F" stroke="#152E4A" stroke-width="0.5" opacity="0.9"/>
    <polygon points="90,0 20,-12 30,0 20,12" fill="#2A4A70" stroke="#152E4A" stroke-width="0.5" opacity="0.7"/>
    <!-- West (gold) -->
    <polygon points="-90,0 -20,12 -30,0 -20,-12" fill="#C49B32" stroke="#9A7820" stroke-width="0.5"/>
    <polygon points="-90,0 -20,-12 -30,0 -20,12" fill="#B08A28" stroke="#9A7820" stroke-width="0.5" opacity="0.7"/>

    <!-- Intercardinal -->
    <g transform="rotate(45)">
      <polygon points="0,-70 8,-20 0,-26 -8,-20" fill="#C49B32" opacity="0.5"/>
      <polygon points="0,70 8,20 0,26 -8,20" fill="#1E3A5F" opacity="0.4"/>
      <polygon points="70,0 20,8 26,0 20,-8" fill="#1E3A5F" opacity="0.4"/>
      <polygon points="-70,0 -20,8 -26,0 -20,-8" fill="#C49B32" opacity="0.5"/>
    </g>

    <!-- Center circle -->
    <circle cx="0" cy="0" r="14" fill="#C49B32" stroke="#9A7820" stroke-width="1"/>
    <circle cx="0" cy="0" r="9" fill="#F0F4F8" stroke="#C49B32" stroke-width="1"/>
    <circle cx="0" cy="0" r="4" fill="#C49B32"/>

    <!-- Cardinal letters - dark -->
    <text x="0" y="-72" text-anchor="middle" dominant-baseline="auto" fill="#1E3A5F" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" letter-spacing="1">N</text>
    <text x="0" y="84" text-anchor="middle" dominant-baseline="auto" fill="#1E3A5F" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" opacity="0.7">S</text>
    <text x="76" y="5" text-anchor="middle" dominant-baseline="middle" fill="#1E3A5F" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" opacity="0.7">E</text>
    <text x="-76" y="5" text-anchor="middle" dominant-baseline="middle" fill="#1E3A5F" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" opacity="0.7">W</text>
  </g>

  <!-- DIROPS text -->
  <text x="150" y="310" text-anchor="middle" fill="#1E3A5F" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="bold" letter-spacing="8">DIROPS</text>
</svg>