<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A843"/>
      <stop offset="50%" style="stop-color:#C49B32"/>
      <stop offset="100%" style="stop-color:#B08A28"/>
    </linearGradient>
    <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A5C"/>
      <stop offset="100%" style="stop-color:#152E4A"/>
    </linearGradient>
  </defs>

  <g transform="translate(150, 150)">
    <!-- Gear ring -->
    <circle cx="0" cy="0" r="120" fill="url(#gold)"/>
    <g fill="url(#gold)">
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(0)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(15)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(30)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(45)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(60)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(75)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(90)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(105)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(120)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(135)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(150)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(165)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(180)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(195)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(210)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(225)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(240)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(255)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(270)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(285)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(300)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(315)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(330)"/>
      <rect x="-10" y="-138" width="20" height="22" rx="2" transform="rotate(345)"/>
    </g>

    <!-- Inner circle -->
    <circle cx="0" cy="0" r="108" fill="url(#navy)"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#D4A843" stroke-width="2" opacity="0.6"/>

    <!-- Compass rose -->
    <polygon points="0,-90 12,-20 0,-30 -12,-20" fill="#D4A843"/>
    <polygon points="0,90 12,20 0,30 -12,20" fill="#FFFFFF" opacity="0.9"/>
    <polygon points="90,0 20,12 30,0 20,-12" fill="#FFFFFF" opacity="0.9"/>
    <polygon points="-90,0 -20,12 -30,0 -20,-12" fill="#D4A843"/>

    <g transform="rotate(45)">
      <polygon points="0,-70 8,-20 0,-26 -8,-20" fill="#D4A843" opacity="0.6"/>
      <polygon points="0,70 8,20 0,26 -8,20" fill="#FFFFFF" opacity="0.5"/>
      <polygon points="70,0 20,8 26,0 20,-8" fill="#FFFFFF" opacity="0.5"/>
      <polygon points="-70,0 -20,8 -26,0 -20,-8" fill="#D4A843" opacity="0.6"/>
    </g>

    <!-- Center -->
    <circle cx="0" cy="0" r="14" fill="#D4A843"/>
    <circle cx="0" cy="0" r="9" fill="url(#navy)" stroke="#D4A843" stroke-width="1"/>
    <circle cx="0" cy="0" r="4" fill="#D4A843"/>

    <!-- Letters -->
    <text x="0" y="-72" text-anchor="middle" fill="#FFF" font-family="Arial,sans-serif" font-size="18" font-weight="bold">N</text>
    <text x="0" y="84" text-anchor="middle" fill="#FFF" font-family="Arial,sans-serif" font-size="14" font-weight="bold" opacity="0.8">S</text>
    <text x="76" y="5" text-anchor="middle" dominant-baseline="middle" fill="#FFF" font-family="Arial,sans-serif" font-size="14" font-weight="bold" opacity="0.8">E</text>
    <text x="-76" y="5" text-anchor="middle" dominant-baseline="middle" fill="#FFF" font-family="Arial,sans-serif" font-size="14" font-weight="bold" opacity="0.8">W</text>
  </g>
</svg>